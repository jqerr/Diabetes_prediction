experiment_id: exp_001
description: "Random forest baseline, default hyperparameters"
hypothesis: "Out-of-the-box RF with class_weight=balanced establishes a tree-based baseline before any tuning"

data:
  use_scaled: false   # tree models are scale-invariant

model:
  type: RandomForestClassifier
  params:
    n_estimators: 100
    class_weight: balanced
    random_state: 42
