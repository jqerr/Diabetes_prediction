experiment_id: exp_003
description: "XGBoost + pairwise interaction features (Glucose*BMI, Glucose*Age, BMI*Age)"
hypothesis: "Interactions between the three strongest EDA predictors add signal XGBoost cannot learn from individual features alone"

data:
  use_scaled: false

features:
  module: src.features
  transforms: [interactions_v1]

model:
  type: xgboost.XGBClassifier
  params:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    scale_pos_weight: 1.87
    random_state: 42
    eval_metric: logloss
    verbosity: 0
