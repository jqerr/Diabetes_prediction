experiment_id: exp_005
description: "XGBoost + SMOTE + RandomizedSearchCV hyperparameter tuning"
hypothesis: "Tuning learning_rate, depth, subsample and colsample on top of SMOTE baseline improves over exp_004 defaults"

data:
  use_scaled: false

sampling:
  method: imblearn.over_sampling.SMOTE
  params:
    random_state: 42

search:
  scoring: roc_auc
  n_iter: 50
  param_grid:
    n_estimators:     [100, 200, 300, 500]
    max_depth:        [3, 4, 5, 6, 7]
    learning_rate:    [0.01, 0.05, 0.1, 0.2]
    subsample:        [0.6, 0.7, 0.8, 1.0]
    colsample_bytree: [0.6, 0.7, 0.8, 1.0]
    min_child_weight: [1, 3, 5]

model:
  type: xgboost.XGBClassifier
  params:
    random_state: 42
    eval_metric: logloss
    verbosity: 0
